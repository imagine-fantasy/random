  <rect x="290" y="536" width="380" height="58" rx="6" fill="#c3fae8" stroke="#087f5b" stroke-width="2"/>
  <!-- speaker icon -->
  <polygon points="306,548 306,580 320,580 338,592 338,536 320,548" fill="none" stroke="#087f5b" stroke-width="2"/>
  <path d="M344,550 Q356,564 344,578" fill="none" stroke="#087f5b" stroke-width="2"/>
  <path d="M352,544 Q370,564 352,584" fill="none" stroke="#087f5b" stroke-width="2"/>
  <text x="490" y="558" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">Voice synthesis</text>
  <text x="490" y="576" font-size="11" fill="#087f5b" text-anchor="middle">Cloned voice · real-time output to user</text>

  <!-- ══ AGENTIC TOOLS ROW ══ -->
  <!-- Jira -->
  <rect x="785" y="540" width="120" height="52" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.8"/>
  <!-- list icon -->
  <line x1="800" y1="554" x2="820" y2="554" stroke="#1971c2" stroke-width="2"/>
  <line x1="800" y1="562" x2="820" y2="562" stroke="#1971c2" stroke-width="2"/>
  <line x1="800" y1="570" x2="814" y2="570" stroke="#1971c2" stroke-width="2"/>
  <text x="845" y="558" font-size="12" font-weight="600" fill="#0c447c" text-anchor="middle">Jira</text>
  <text x="845" y="574" font-size="11" fill="#1971c2" text-anchor="middle">Write AC back</text>
  <text x="845" y="586" font-size="10" fill="#1971c2" text-anchor="middle">Output not input</text>

  <!-- Email / Teams -->
  <rect x="920" y="540" width="120" height="52" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.8"/>
  <rect x="932" y="552" width="28" height="20" rx="2" fill="none" stroke="#1971c2" stroke-width="1.5"/>
  <polyline points="932,552 946,562 960,552" fill="none" stroke="#1971c2" stroke-width="1.5"/>
  <text x="980" y="558" font-size="12" font-weight="600" fill="#0c447c" text-anchor="middle">Email / Teams</text>
  <text x="980" y="574" font-size="11" fill="#1971c2" text-anchor="middle">Escalate to PO</text>

  <!-- Confluence -->
  <rect x="1055" y="540" width="110" height="52" rx="6" fill="#e7f5ff" stroke="#1971c2" stroke-width="1.8"/>
  <rect x="1066" y="550" width="22" height="28" rx="1" fill="none" stroke="#1971c2" stroke-width="1.5"/>
  <line x1="1070" y1="556" x2="1084" y2="556" stroke="#1971c2" stroke-width="1"/>
  <line x1="1070" y1="562" x2="1084" y2="562" stroke="#1971c2" stroke-width="1"/>
  <line x1="1070" y1="568" x2="1080" y2="568" stroke="#1971c2" stroke-width="1"/>
  <text x="1110" y="558" font-size="12" font-weight="600" fill="#0c447c" text-anchor="middle">Confluence</text>
  <text x="1110" y="574" font-size="11" fill="#1971c2" text-anchor="middle">Read / write back</text>

  <!-- ══ THREE LAYER SECTION ══ -->
  <line x1="40" y1="618" x2="1160" y2="618" stroke="#dee2e6" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="40" y="638" font-size="12" font-weight="600" fill="#c92a2a">THREE-LAYER FIRM INTELLIGENCE</text>
  <text x="302" y="638" font-size="11" fill="#868e96">— nightly batch</text>

  <!-- Layer 1 -->
  <rect x="40" y="650" width="220" height="80" rx="6" fill="#E8F8FF" stroke="#1971c2" stroke-width="2"/>
  <rect x="40" y="650" width="72" height="20" rx="4" fill="#4FC3F7"/>
  <text x="76" y="664" font-size="10" font-weight="700" fill="#0D1B4B" text-anchor="middle">LAYER 1</text>
  <text x="150" y="676" font-size="13" font-weight="600" fill="#0D7FA8" text-anchor="middle">Squad Emma × N</text>
  <text x="150" y="694" font-size="11" fill="#0D7FA8" text-anchor="middle">One per scrum team</text>
  <text x="150" y="710" font-size="11" fill="#0D7FA8" text-anchor="middle">Own Weaviate store · voice tools</text>

  <!-- L1 → L2 -->
  <line x1="260" y1="690" x2="310" y2="690" stroke="#868e96" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Layer 2 -->
  <rect x="310" y="650" width="260" height="80" rx="6" fill="#F3EEFF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="310" y="650" width="72" height="20" rx="4" fill="#7C3AED"/>
  <text x="346" y="664" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">LAYER 2</text>
  <text x="440" y="676" font-size="13" font-weight="600" fill="#5B21B6" text-anchor="middle">LOB Coordinator</text>
  <text x="440" y="694" font-size="11" fill="#5B21B6" text-anchor="middle">Reads all squad stores</text>
  <text x="440" y="710" font-size="11" fill="#5B21B6" text-anchor="middle">Spots duplicates · alerts Product Owners</text>

  <!-- L2 → L3 -->
  <line x1="570" y1="690" x2="620" y2="690" stroke="#868e96" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Layer 3 -->
  <rect x="620" y="650" width="260" height="80" rx="6" fill="#E6FFF5" stroke="#00C896" stroke-width="2"/>
  <rect x="620" y="650" width="72" height="20" rx="4" fill="#00C896"/>
  <text x="656" y="664" font-size="10" font-weight="700" fill="#0D1B4B" text-anchor="middle">LAYER 3</text>
  <text x="750" y="676" font-size="13" font-weight="600" fill="#006644" text-anchor="middle">Enterprise Intelligence</text>
  <text x="750" y="694" font-size="11" fill="#006644" text-anchor="middle">Cross-LOB patterns · systemic issues</text>
  <text x="750" y="710" font-size="11" fill="#006644" text-anchor="middle">Alerts MDs · Directors · Leads</text>

  <!-- L2 → PO alert -->
  <line x1="440" y1="730" x2="440" y2="764" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <rect x="360" y="766" width="160" height="40" rx="6" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="440" y="791" font-size="11" fill="#5B21B6" text-anchor="middle">Product Owner alerted</text>

  <!-- L3 → Leadership alert -->
  <line x1="750" y1="730" x2="750" y2="764" stroke="#00C896" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>
  <rect x="640" y="766" width="220" height="40" rx="6" fill="#E6FFF5" stroke="#00C896" stroke-width="1.5"/>
  <text x="750" y="791" font-size="11" fill="#006644" text-anchor="middle">MDs · Directors · Leads alerted</text>

  <!-- Footer -->
  <rect x="0" y="858" width="1200" height="42" fill="#1E2761"/>
  <text x="600" y="884" font-size="12" fill="#CADCFC" text-anchor="middle">Emma = Agentic RAG  ·  Retrieves → Reasons → Plans → Acts  ·  Not a chatbot. A compounding domain intelligence layer.</text>

</svg>