  <polygon points="116,412 212,412 192,440 148,440" fill="#ffa94d" opacity="0.4"/>
  <polygon points="148,440 192,440 180,458 160,458" fill="#ffa94d" opacity="0.6"/>
  <line x1="160" y1="458" x2="160" y2="468" stroke="#e67700" stroke-width="2.5"/>
  <line x1="168" y1="458" x2="168" y2="468" stroke="#e67700" stroke-width="2.5"/>
  <text x="174" y="444" font-size="12" font-weight="600" fill="#7c4a00" text-anchor="start">Write</text>
  <text x="174" y="459" font-size="12" font-weight="600" fill="#7c4a00" text-anchor="start">intercept</text>
  <text x="174" y="472" font-size="10" fill="#e67700" text-anchor="start">Classify · filter noise</text>

  <!-- Write intercept → Weaviate (down) -->
  <line x1="174" y1="482" x2="174" y2="520" stroke="#e67700" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M174,520 L820,520 L820,490" fill="none" stroke="#e67700" stroke-width="1.2" stroke-dasharray="4,3"/>

