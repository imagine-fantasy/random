  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#e67700" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#087f5b" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#5c2d91" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="120" y1="170" x2="395" y2="230" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="170" x2="420" y2="230" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="138" x2="480" y2="230" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="750" y1="170" x2="560" y2="230" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══ SPEECH RECOGNITION ══ -->
  <rect x="340" y="232" width="280" height="60" rx="6" fill="#c3fae8" stroke="#087f5b" stroke-width="2"/>
  <!-- mic icon -->
  <rect x="356" y="244" width="12" height="20" rx="6" fill="#087f5b"/>
  <path d="M350,260 Q350,272 362,272 Q374,272 374,260" fill="none" stroke="#087f5b" stroke-width="2"/>
  <line x1="362" y1="272" x2="362" y2="280" stroke="#087f5b" stroke-width="2"/>
  <line x1="356" y1="280" x2="368" y2="280" stroke="#087f5b" stroke-width="1.5"/>
  <text x="500" y="258" font-size="13" font-weight="600" fill="#085041" text-anchor="middle">Speech recognition</text>
  <text x="500" y="276" font-size="11" fill="#087f5b" text-anchor="middle">Transcription · Speaker identification</text>

  <!-- STT → Orchestrator -->
  <line x1="480" y1="292" x2="480" y2="322" stroke="#495057" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ══ AGENTIC ORCHESTRATOR ══ -->
  <rect x="290" y="324" width="380" height="72" rx="6" fill="#d0bfff" stroke="#5c2d91" stroke-width="2"/>
  <!-- gear icon -->
  <circle cx="314" cy="360" r="14" fill="#eeedfe" stroke="#5c2d91" stroke-width="2"/>
  <circle cx="314" cy="360" r="7" fill="#d0bfff" stroke="#5c2d91" stroke-width="1.5"/>
  <line x1="314" y1="344" x2="314" y2="348" stroke="#5c2d91" stroke-width="3"/>
  <line x1="314" y1="372" x2="314" y2="376" stroke="#5c2d91" stroke-width="3"/>
  <line x1="298" y1="360" x2="302" y2="360" stroke="#5c2d91" stroke-width="3"/>
  <line x1="326" y1="360" x2="330" y2="360" stroke="#5c2d91" stroke-width="3"/>
  <text x="490" y="347" font-size="13" font-weight="600" fill="#3b197a" text-anchor="middle">Agentic orchestrator</text>
  <text x="490" y="365" font-size="11" fill="#5c2d91" text-anchor="middle">Gather context → Reason → Plan → Act → Store</text>
  <text x="490" y="382" font-size="11" fill="#5c2d91" text-anchor="middle">Persistent session checkpoint per squad</text>

  <!-- Orchestrator → LLM Gateway -->
  <line x1="480" y1="396" x2="480" y2="428" stroke="#495057" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Orchestrator → Write Intercept (left, dashed) -->
  <path d="M290,360 L180,360 L180,420" fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="220" y="354" font-size="10" fill="#e67700" text-anchor="middle">writes via</text>

  <!-- Orchestrator → Weaviate (right, dashed) -->
  <path d="M670,360 L820,360 L820,440" fill="none" stroke="#1971c2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="748" y="354" font-size="10" fill="#1971c2" text-anchor="middle">retrieves</text>

  <!-- ══ LLM GATEWAY ══ -->
  <rect x="290" y="430" width="380" height="72" rx="6" fill="#eeedfe" stroke="#5c2d91" stroke-width="2"/>
  <!-- cloud icon -->
  <ellipse cx="318" cy="462" rx="16" ry="10" fill="#d0bfff" stroke="#5c2d91" stroke-width="1.5"/>
  <ellipse cx="308" cy="468" rx="12" ry="9" fill="#d0bfff" stroke="#5c2d91" stroke-width="1.5"/>
  <ellipse cx="330" cy="468" rx="14" ry="9" fill="#d0bfff" stroke="#5c2d91" stroke-width="1.5"/>
  <text x="490" y="453" font-size="13" font-weight="600" fill="#3b197a" text-anchor="middle">LLM gateway</text>
  <text x="490" y="471" font-size="11" fill="#5c2d91" text-anchor="middle">Internal approved provider</text>
  <text x="490" y="489" font-size="11" fill="#5c2d91" text-anchor="middle">AWS Bedrock · Azure OpenAI · Fusion SDK</text>

  <!-- LLM → Voice synthesis -->
  <line x1="480" y1="502" x2="480" y2="534" stroke="#087f5b" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- LLM → Tools (right dashed) -->
  <path d="M670,466 L780,466 L780,544" fill="none" stroke="#e67700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="730" y="460" font-size="10" fill="#e67700" text-anchor="middle">acts via</text>

