<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="900" fill="#F8F9FB"/>

  <!-- Title -->
  <text x="40" y="38" font-size="20" font-weight="700" fill="#1a1a2e">Emma — Enterprise Architecture</text>
  <text x="40" y="56" font-size="12" fill="#6c757d">Agentic RAG · Three-layer squad intelligence · Voice-first domain memory</text>
  <line x1="40" y1="64" x2="1160" y2="64" stroke="#dee2e6" stroke-width="1"/>

  <!-- ══ USERS ROW ══ -->
  <!-- Developer -->
  <circle cx="120" cy="100" r="14" fill="none" stroke="#495057" stroke-width="1.8"/>
  <line x1="120" y1="114" x2="120" y2="148" stroke="#495057" stroke-width="1.8"/>
  <line x1="98" y1="128" x2="142" y2="128" stroke="#495057" stroke-width="1.8"/>
  <line x1="120" y1="148" x2="102" y2="168" stroke="#495057" stroke-width="1.8"/>
  <line x1="120" y1="148" x2="138" y2="168" stroke="#495057" stroke-width="1.8"/>
  <text x="120" y="182" font-size="11" fill="#495057" text-anchor="middle">Developer</text>

  <!-- Product Owner -->
  <circle cx="310" cy="100" r="14" fill="none" stroke="#495057" stroke-width="1.8"/>
  <line x1="310" y1="114" x2="310" y2="148" stroke="#495057" stroke-width="1.8"/>
  <line x1="288" y1="128" x2="332" y2="128" stroke="#495057" stroke-width="1.8"/>
  <line x1="310" y1="148" x2="292" y2="168" stroke="#495057" stroke-width="1.8"/>
  <line x1="310" y1="148" x2="328" y2="168" stroke="#495057" stroke-width="1.8"/>
  <text x="310" y="182" font-size="11" fill="#495057" text-anchor="middle">Product Owner</text>

  <!-- Zoom/Teams — video camera icon -->
  <rect x="495" y="86" width="70" height="52" rx="6" fill="none" stroke="#495057" stroke-width="1.8"/>
  <polygon points="565,92 595,80 595,144 565,132" fill="none" stroke="#495057" stroke-width="1.8"/>
  <text x="530" y="154" font-size="11" fill="#495057" text-anchor="middle">Zoom / Teams</text>

  <!-- New joiner -->
  <circle cx="750" cy="100" r="14" fill="none" stroke="#495057" stroke-width="1.8"/>
  <line x1="750" y1="114" x2="750" y2="148" stroke="#495057" stroke-width="1.8"/>
  <line x1="728" y1="128" x2="772" y2="128" stroke="#495057" stroke-width="1.8"/>
  <line x1="750" y1="148" x2="732" y2="168" stroke="#495057" stroke-width="1.8"/>
  <line x1="750" y1="148" x2="768" y2="168" stroke="#495057" stroke-width="1.8"/>
  <text x="750" y="182" font-size="11" fill="#495057" text-anchor="middle">New joiner</text>

