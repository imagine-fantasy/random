  <ellipse cx="870" cy="442" rx="70" ry="18" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <rect x="800" y="442" width="140" height="60" fill="#d0ebff" stroke="none"/>
  <line x1="800" y1="442" x2="800" y2="502" stroke="#1971c2" stroke-width="2"/>
  <line x1="940" y1="442" x2="940" y2="502" stroke="#1971c2" stroke-width="2"/>
  <ellipse cx="870" cy="502" rx="70" ry="18" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <text x="870" y="462" font-size="13" font-weight="600" fill="#0c447c" text-anchor="middle">Weaviate</text>
  <text x="870" y="478" font-size="11" fill="#1971c2" text-anchor="middle">Domain knowledge</text>
  <text x="870" y="494" font-size="11" fill="#1971c2" text-anchor="middle">Conversations · AC · retros</text>

  <!-- Weaviate → LLM (return dashed) -->
  <path d="M800,472 L680,472 L680,466" fill="none" stroke="#1971c2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

